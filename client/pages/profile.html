<!DOCTYPE html>
<html>
<head>
  <title>Medical Identification - Profile</title>
  <style>
    body {
      margin:0;
      background:#58111A;
      font-family:Arial;
      color:white;
      padding:40px;
    }

    .container {
      max-width:800px;
      margin:auto;
      background:#3D0C02;
      padding:30px;
      border-radius:12px;
    }

    h2 {
      text-align:center;
      margin-bottom:25px;
    }

    h3 {
      border-bottom:1px solid #660000;
      padding-bottom:5px;
    }

    p {
      margin:6px 0;
    }

    button {
      padding:10px 15px;
      margin:8px 5px 0 0;
      background:#660000;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover {
      opacity:0.85;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Medical Identification Profile</h2>

  <div id="profileData"></div>

  <hr>

  <h3>Your QR Code</h3>
  <div id="qrcode"></div>

  <br>
  <button onclick="generateNewQR()">Generate New QR</button>
  <button onclick="downloadQR()">Download QR</button>
  <button onclick="editProfile()">Edit Profile</button>
  <button onclick="logout()">Logout</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="/js/profile.js"></script>

</body>
</html>

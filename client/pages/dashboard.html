<!DOCTYPE html>
<html>
<head>
  <title>Medical Identification - Edit Profile</title>
  <style>
    body {
      margin:0;
      background:#58111A;
      font-family:Arial;
      color:white;
      padding:30px;
    }

    .container {
      max-width:700px;
      margin:auto;
      background:#3D0C02;
      padding:30px;
      border-radius:12px;
    }

    h2 {
      text-align:center;
      margin-bottom:20px;
    }

    input, select, textarea {
      width:100%;
      padding:10px;
      margin:8px 0;
      border:none;
      border-radius:6px;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:15px;
      background:#660000;
      color:white;
      border:none;
      border-radius:6px;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover {
      opacity:0.85;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Edit Medical Identification Profile</h2>

  <form id="profileForm">

    <input id="firstName" placeholder="First Name" required>
    <input id="middleName" placeholder="Middle Name">
    <input id="lastName" placeholder="Last Name" required>

    <select id="sex">
      <option value="">Select Sex</option>
      <option>Male</option>
      <option>Female</option>
    </select>

    <input type="date" id="dob">
    <input id="bloodType" placeholder="Blood Type">
    <input id="contactNumber" placeholder="Contact Number">
    <input id="religion" placeholder="Religion">

    <hr>

    <input id="emergencyFirstName" placeholder="Emergency First Name">
    <input id="emergencyMiddleName" placeholder="Emergency Middle Name">
    <input id="emergencyLastName" placeholder="Emergency Last Name">
    <input id="emergencyRelationship" placeholder="Relationship">
    <input id="emergencyContactNumber" placeholder="Emergency Contact Number">

    <hr>

    <textarea id="allergies" placeholder="Allergies"></textarea>
    <textarea id="medications" placeholder="Medications"></textarea>
    <textarea id="medicalConditions" placeholder="Medical Conditions"></textarea>
    <textarea id="pastIllness" placeholder="Past Illness"></textarea>
    <textarea id="familyHistory" placeholder="Family History"></textarea>

    <hr>

    <input id="philhealth" placeholder="PhilHealth">
    <input id="hmo" placeholder="HMO">

    <button type="submit">Save Profile</button>
  </form>

  <button onclick="goProfile()">Back to Profile</button>
  <button onclick="logout()">Logout</button>

</div>

<script>
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "/pages/login.html";
}

/* LOAD EXISTING PROFILE */
window.onload = async () => {
  const res = await fetch("/api/profile", {
    headers: { Authorization: "Bearer " + token }
  });

  if (res.status === 404) return;

  const data = await res.json();

  if (!data || !data._id) return;

  for (const key in data) {
    if (document.getElementById(key)) {
      document.getElementById(key).value =
        key === "dob" && data[key]
          ? new Date(data[key]).toISOString().split("T")[0]
          : data[key];
    }
  }
};

/* SAVE PROFILE */
document.getElementById("profileForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = {};

  document.querySelectorAll("input, select, textarea").forEach(el => {
    formData[el.id] = el.value;
  });

  const res = await fetch("/api/profile", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify(formData)
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.message || "Error saving profile");
    return;
  }

  alert("Profile updated successfully!");
  window.location.href = "/pages/profile.html";
});

function goProfile() {
  window.location.href = "/pages/profile.html";
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "/pages/login.html";
}
</script>

</body>
</html>

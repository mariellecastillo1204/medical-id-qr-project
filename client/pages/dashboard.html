<!DOCTYPE html>
<html>
<head>
  <title>Medical Identification - Edit Profile</title>
  <style>
    body {
      margin:0;
      background:#58111A;
      font-family:Arial;
      color:white;
      padding:30px;
    }

    .container {
      max-width:800px;
      margin:auto;
      background:#3D0C02;
      padding:30px;
      border-radius:12px;
    }

    h2 {
      text-align:center;
      margin-bottom:10px;
    }

    h3 {
      border-bottom:1px solid #660000;
      padding-bottom:5px;
      margin-top:25px;
    }

    label {
      display:block;
      margin-top:10px;
      font-weight:bold;
    }

    input, select, textarea {
      width:100%;
      padding:10px;
      margin-top:5px;
      border:none;
      border-radius:6px;
    }

    small {
      color:#ffcccc;
      font-size:12px;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:15px;
      background:#660000;
      color:white;
      border:none;
      border-radius:6px;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover {
      opacity:0.85;
    }

    .note {
      font-size:13px;
      color:#ffcccc;
      margin-bottom:15px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Medical Identification Dashboard</h2>

  <p class="note">
    All fields marked with (*) are required.  
    If not applicable, type <strong>N/A</strong>.
  </p>

  <form id="profileForm">

    <!-- 1. PERSONAL INFORMATION -->
    <h3>1. Personal Information</h3>

    <label>First Name *</label>
    <input id="firstName" required>

    <label>Middle Initial *</label>
    <input id="middleName" required>

    <label>Last Name *</label>
    <input id="lastName" required>

    <label>Sex *</label>
    <select id="sex" required>
      <option value="">Select Sex</option>
      <option>Male</option>
      <option>Female</option>
    </select>

    <label>Date of Birth *</label>
    <input type="date" id="dob" required>

    <label>Blood Type *</label>
    <input id="bloodType" required>

    <label>Contact Number *</label>
    <input id="contactNumber" required>

    <label>Religion *</label>
    <input id="religion" required>

    <!-- 2. EMERGENCY CONTACT -->
    <h3>2. Emergency Contact</h3>

    <label>First Name *</label>
    <input id="emergencyFirstName" required>

    <label>Middle Initial *</label>
    <input id="emergencyMiddleName" required>

    <label>Last Name *</label>
    <input id="emergencyLastName" required>

    <label>Relationship to Patient *</label>
    <input id="emergencyRelationship" required>

    <label>Emergency Contact Number *</label>
    <input id="emergencyContactNumber" required>

    <!-- 3. MEDICAL INFORMATION -->
    <h3>3. Medical Information</h3>

    <label>Height (inches) *</label>
    <input id="height" type="number" min="1" required>
    <small>Must be numeric (inches).</small>

    <label>Weight (kg) *</label>
    <input id="weight" type="number" min="1" required>
    <small>Must be numeric (kilograms).</small>

    <label>Allergies *</label>
    <textarea id="allergies" required></textarea>

    <label>Maintenance / Prescription Medications *</label>
    <textarea id="medications" required></textarea>

    <label>Medical Condition *</label>
    <textarea id="medicalConditions" required></textarea>

    <label>Past Illness *</label>
    <textarea id="pastIllness" required></textarea>

    <label>Family Medical History *</label>
    <textarea id="familyHistory" required></textarea>

    <!-- 4. INSURANCE -->
    <h3>4. Insurance / Benefits</h3>

    <label>PhilHealth ID Number *</label>
    <input id="philhealth" required>

    <label>HMO / Health Insurance Provider *</label>
    <input id="hmo" required>

    <button type="submit">Save Profile</button>
  </form>

  <button onclick="goProfile()">Back to Profile</button>
  <button onclick="logout()">Logout</button>
</div>

<script>
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "/pages/login.html";
}

/* LOAD EXISTING PROFILE */
window.onload = async () => {
  const res = await fetch("/api/profile", {
    headers: { Authorization: "Bearer " + token }
  });

  if (res.status === 404) return;

  const data = await res.json();
  if (!data || !data._id) return;

  for (const key in data) {
    if (document.getElementById(key)) {
      document.getElementById(key).value =
        key === "dob" && data[key]
          ? new Date(data[key]).toISOString().split("T")[0]
          : data[key];
    }
  }
};

/* SAVE PROFILE WITH VALIDATION */
document.getElementById("profileForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = {};

  for (const el of document.querySelectorAll("input, select, textarea")) {

    if (el.hasAttribute("required") && !el.value.trim()) {
      alert("All required fields must be filled. Use 'N/A' if not applicable.");
      return;
    }

    formData[el.id] = el.value.trim();
  }

  const res = await fetch("/api/profile", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify(formData)
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.message || "Error saving profile");
    return;
  }

  alert("Profile updated successfully!");
  window.location.href = "/pages/profile.html";
});

function goProfile() {
  window.location.href = "/pages/profile.html";
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "/pages/login.html";
}
</script>

</body>
</html>

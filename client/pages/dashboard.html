<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Medical Identity Dashboard</h2>

<div id="profileView"></div>

<button onclick="toggleEdit()">Edit Profile</button>
<button onclick="logout()">Logout</button>

<hr/>

<form id="medicalForm" style="display:none;">

  <input type="text" id="firstName" placeholder="First Name" required />
  <br /><br />

  <input type="text" id="lastName" placeholder="Last Name" required />
  <br /><br />

  <input type="text" id="bloodType" placeholder="Blood Type" />
  <br /><br />

  <input type="text" id="contactNumber" placeholder="Contact Number" />
  <br /><br />

  <input type="text" id="emergencyFirstName" placeholder="Emergency First Name" />
  <br /><br />

  <input type="text" id="emergencyLastName" placeholder="Emergency Last Name" />
  <br /><br />

  <input type="text" id="emergencyNumber" placeholder="Emergency Number" />
  <br /><br />

  <textarea id="allergies" placeholder="Allergies"></textarea>
  <br /><br />

  <textarea id="medications" placeholder="Medications"></textarea>
  <br /><br />

  <textarea id="medicalConditions" placeholder="Medical Conditions"></textarea>
  <br /><br />

  <button type="submit">Save</button>
</form>

<br/>
<img id="qrImage" width="200"/>

<script src="../js/dashboard.js"></script>
</body>
</html>
